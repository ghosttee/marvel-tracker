<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marvel Watch Tracker</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; }
      input { font-family: inherit; font-size: 14px; background: #1a1a1a; border: 1px solid #333; color: #f0f0f0; border-radius: 8px; padding: 9px 12px; width: 100%; outline: none; }
      input:focus { border-color: #E24B4A; }
      input::placeholder { color: #555; }
      button { font-family: inherit; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
